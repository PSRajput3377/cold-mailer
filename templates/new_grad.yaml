category: new_grad
label: "New Graduate Opportunity"
templates:
  - id: new_grad_01
    subject: "New-grad SWE interested in {{company}}"
    body: |
      {{greeting}}

      I'm finishing up my degree and looking for a new-grad Software Engineer role, and {{company}} is high on my list. I've been working mostly with {{skills}}, and {% if recent_internship %}my time as a {{recent_internship}} gave me a real feel for shipping code that other people depend on.{% else %}I've spent the last year turning class projects into things people actually use.{% endif %}

      {% if github %}A bit of my work is on {{github}} if you want a quick look.{% endif %} {{cta}}

      {{signature}}

  - id: new_grad_02
    subject: "{{role}} application — quick intro"
    body: |
      {{greeting}}

      Quick note: I just applied for the {{role}} opening{% if job_id %} (req {{job_id}}){% endif %} and wanted to say hello directly rather than disappear into an inbox.

      {% if top_highlight %}{{top_highlight}}{% else %}Most of my hands-on experience is in {{skills}}, built across internships and side projects.{% endif %} {{cta}}

      {{signature}}

  - id: new_grad_03
    subject: "Recent grad, {{skills}} background"
    body: |
      {{greeting}}

      I graduate this term and I'm focused on finding the right first engineering role rather than just any role. {{company}}'s work is the kind of thing I'd be glad to spend my early career on.

      I've worked with {{skills}}{% if recent_internship %}, including a stint as a {{recent_internship}}{% endif %}. {% if portfolio %}There's more at {{portfolio}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: new_grad_04
    subject: "Interested in entry-level SWE at {{company}}"
    body: |
      {{greeting}}

      I'm a soon-to-be grad reaching out about new-grad engineering roles at {{company}}. I'll keep this short.

      {% if recent_internship %}My most recent experience was as a {{recent_internship}}, where I learned how much detail goes into production code.{% else %}I've spent the last year building real projects, not just coursework.{% endif %} I'm comfortable with {{skills}}.

      {{cta}}

      {{signature}}

  - id: new_grad_05
    subject: "Hello from a {{role}} candidate"
    body: |
      {{greeting}}

      I came across the {% if job_title %}{{job_title}}{% else %}{{role}}{% endif %} role and it lines up well with what I've been building. I'm graduating soon and ready to take on a real engineering team's problems.

      A snapshot: {% if top_highlight %}{{top_highlight}}{% else %}solid footing in {{skills}} and a habit of shipping things end to end.{% endif %} {% if github %}Code lives at {{github}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: new_grad_06
    subject: "New grad who'd love to build at {{company}}"
    body: |
      {{greeting}}

      I'll be honest — {{company}} is one of the few places I'd genuinely be excited to start my career, so I wanted to reach out directly.

      {% if recent_internship %}As a {{recent_internship}} I got my first taste of shipping under real constraints, and I want more of it.{% else %}I've been building projects with {{skills}} and I'm hungry to do it on a real team.{% endif %} {{cta}}

      {{signature}}

  - id: new_grad_07
    subject: "Quick question about new-grad roles"
    body: |
      {{greeting}}

      I'm wrapping up my degree and exploring new-grad Software Engineer openings. Are you the right person to talk to about {{company}}'s entry-level pipeline, or could you point me toward them?

      For context: {{skills}}{% if recent_internship %}, plus recent work as a {{recent_internship}}{% endif %}. {% if linkedin %}More on LinkedIn: {{linkedin}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: new_grad_08
    subject: "Applied for {{role}}, wanted to introduce myself"
    body: |
      {{greeting}}

      I submitted my application for the {{role}} position{% if job_url %} ({{job_url}}){% endif %} and figured a short, human note couldn't hurt.

      {% if top_highlight %}{{top_highlight}}{% else %}I work mainly in {{skills}} and care a lot about writing code other people can read.{% endif %} I'm not looking to fill a seat — I want a place I can actually grow. {{cta}}

      {{signature}}

  - id: new_grad_09
    subject: "Entry-level engineer, {{skills}}"
    body: |
      {{greeting}}

      Reaching out about new-grad SWE roles at {{company}}. I'm finishing school and would rather start somewhere with strong engineers than chase a title.

      {% if recent_internship %}I interned as a {{recent_internship}} and shipped work that's still in use.{% endif %} Comfortable with {{skills}}.{% if github %} Samples on {{github}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: new_grad_10
    subject: "Would value a few minutes about {{company}}"
    body: |
      {{greeting}}

      I'm a graduating student looking for my first engineering role, and I've followed {{company}}'s work for a while. Rather than send a cold application alone, I wanted to say hi.

      {% if top_highlight %}{{top_highlight}}{% else %}I've built a few real things with {{skills}} and learned a lot from each one.{% endif %} {% if portfolio %}Portfolio: {{portfolio}}.{% endif %} {{cta}}

      {{signature}}

  - id: new_grad_11
    subject: "New-grad SWE — {{job_title}}"
    body: |
      {{greeting}}

      {% if job_title %}The {{job_title}} role{% else %}Your new-grad engineering posting{% endif %} caught my eye{% if job_id %} (req {{job_id}}){% endif %}, and it's a good match for where I'm headed.

      I'll be done with my degree shortly. Day to day I work in {{skills}}{% if recent_internship %}, sharpened by a recent {{recent_internship}} role{% endif %}. {{cta}}

      {{signature}}

  - id: new_grad_12
    subject: "First job, done right"
    body: |
      {{greeting}}

      I think the first engineering job matters more than people admit, which is why I'm being picky — and why I'm writing to {{company}}.

      {% if recent_internship %}My {{recent_internship}} experience taught me that I learn fastest near good engineers.{% else %}I've learned the most when I'm in over my head a little, which is what I'm after.{% endif %} I work with {{skills}}. {{cta}}

      {{signature}}

  - id: new_grad_13
    subject: "Recent grad reaching out"
    body: |
      {{greeting}}

      Short version: graduating this year, strong in {{skills}}, and genuinely interested in new-grad engineering work at {{company}}.

      {% if github %}You can see how I write code at {{github}}.{% endif %}{% if recent_internship %} Before this I was a {{recent_internship}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: new_grad_14
    subject: "About the {{role}} opening"
    body: |
      {{greeting}}

      I noticed the {{role}} opening and wanted to put a name to my application instead of staying anonymous.

      {% if top_highlight %}{{top_highlight}}{% else %}I've spent my last year building with {{skills}} and I'm ready for the real thing.{% endif %} I know I'm early in my career — I'm fine with that and eager to learn fast. {{cta}}

      {{signature}}

  - id: new_grad_15
    subject: "New grad, real projects, {{skills}}"
    body: |
      {{greeting}}

      Most of what I know I learned by building, not just studying. That's the kind of engineer I'd like to be at {{company}}.

      {% if recent_internship %}I recently worked as a {{recent_internship}};{% endif %} I'm fluent in {{skills}}.{% if portfolio %} A few builds: {{portfolio}}.{% endif %} I'm finishing my degree and looking for the right new-grad role.

      {{cta}}

      {{signature}}

  - id: new_grad_16
    subject: "Hoping to start my career at {{company}}"
    body: |
      {{greeting}}

      I'm a graduating student, and {{company}} is one of the teams I'd most like to learn from early on. Wanted to reach out before applying into the void.

      {% if top_highlight %}{{top_highlight}}{% else %}I've got a solid base in {{skills}} and a few projects I'm proud of.{% endif %} {% if linkedin %}{{linkedin}}{% endif %} {{cta}}

      {{signature}}

  - id: new_grad_17
    subject: "Entry-level SWE interested in your team"
    body: |
      {{greeting}}

      Finishing my degree soon and looking for new-grad engineering roles. I'd rather join a team where I'll be stretched than one where I'll coast, which is what brought me to {{company}}.

      {% if recent_internship %}As a {{recent_internship}} I learned the difference between code that works and code that lasts.{% endif %} Strongest in {{skills}}. {{cta}}

      {{signature}}

  - id: new_grad_18
    subject: "Quick intro — new-grad engineer"
    body: |
      {{greeting}}

      I'll keep this brief. I'm graduating, I write code I'm not embarrassed by, and I'd like to do it at {{company}}.

      {% if github %}Proof's on {{github}}.{% endif %} I work mostly in {{skills}}{% if recent_internship %}, most recently as a {{recent_internship}}{% endif %}.

      {{cta}}

      {{signature}}

  - id: new_grad_19
    subject: "Re: new-grad SWE openings at {{company}}"
    body: |
      {{greeting}}

      Are you hiring new-grad engineers this cycle? I'm graduating and would love to be considered for a {% if job_title %}{{job_title}}{% else %}{{role}}{% endif %} role{% if job_id %} (req {{job_id}}){% endif %}.

      Quick background: {{skills}}{% if recent_internship %}, plus a {{recent_internship}} internship{% endif %}. {% if top_highlight %}{{top_highlight}}{% endif %} {{cta}}

      {{signature}}

  - id: new_grad_20
    subject: "Early-career engineer, eyes on {{company}}"
    body: |
      {{greeting}}

      I'm at the start of my career and trying to be deliberate about where it begins. {{company}} keeps coming up, so here I am.

      {% if recent_internship %}My {{recent_internship}} role showed me what good engineering culture feels like, and I want to keep that going.{% else %}I've built enough on my own to know I want to build alongside a strong team next.{% endif %} I work with {{skills}}.{% if portfolio %} See {{portfolio}}.{% endif %} {{cta}}

      {{signature}}
