category: followup_after_application
label: "Following up after application"
templates:
  - id: followup_after_application_01
    subject: "Following up on my {{job_title}} application"
    body: |
      {{greeting}}

      I applied for the {{job_title}} role{% if job_id %} (Job ID {{job_id}}){% endif %} at {{company}} a little while back, and I'm still very keen on it. My work on {{top_highlight}} feels closely aligned with what the team is building.

      {{cta}}

      {{signature}}
