category: followup_after_application
label: "Following up after application"
templates:
  - id: followup_after_application_01
    subject: "Following up on my {{job_title}} application"
    body: |
      {{greeting}}

      I applied for the {{job_title}} role{% if job_id %} (Job ID {{job_id}}){% endif %} at {{company}} a little while back, and I'm still very keen on it.{% if top_highlight %} My work on {{top_highlight}} feels closely aligned with what the team is building.{% endif %}

      {{cta}}

      {{signature}}
  - id: followup_after_application_02
    subject: "{{job_title}} at {{company}} — still interested"
    body: |
      {{greeting}}

      Quick note to flag that my interest in the {{job_title}} position{% if job_id %} (Job ID {{job_id}}){% endif %} at {{company}} hasn't faded.{% if skills %} I think my background in {{skills}} maps well to the role.{% endif %}

      {{cta}}

      {{signature}}
  - id: followup_after_application_03
    subject: "Checking in on my application"
    body: |
      {{greeting}}

      I submitted my application for the {{job_title}} role at {{company}} recently and wanted to reaffirm how much I'd like to contribute there.{% if top_highlight %} {{top_highlight}} is the kind of work I do best.{% endif %}

      {{cta}}

      {{signature}}
