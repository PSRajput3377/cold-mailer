    subject: "Any update on the {{job_title}} role?"
    body: |
      {{greeting}}

      Following up on my application for {{job_title}}{% if job_id %} (Job ID {{job_id}}){% endif %} at {{company}}.{% if skills %} The role is a strong match for my experience with {{skills}}.{% endif %} I'd be glad to take the next step.

      {{cta}}

      {{signature}}
