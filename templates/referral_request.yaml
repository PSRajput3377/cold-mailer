category: referral_request
label: "Referral Request"
templates:
  # General referral — no specific job link in CSV
  - id: referral_general_01
    subject: "Referral Request for Software Engineer Opportunities"
    body: |
      Hi {{first_name}},

      I hope you're doing well.

      I came across your profile while exploring opportunities at {{company}}. I recently completed my Computer Science degree and am currently working as an Applied AI Engineer Intern at DevRev, where I've been building AI-powered workflows, backend integrations, and automation systems.

      I also have experience developing and deploying scalable full-stack applications using React, FastAPI, PostgreSQL, and AWS, including a centralized placement platform serving thousands of students.

      {% if job_title %}I noticed there are openings for {{job_title}} roles at {{company}}{% else %}I noticed there are openings for Software Engineer roles at {{company}}{% endif %}, and I was wondering if you would be open to referring me. I believe my background aligns well with the role, and I would be grateful if you could take a look at my resume.

      I've attached my resume for your reference. Thank you for your time and consideration.

      {{signature}}

  # Referral with specific role link(s) — set job_url in CSV (use | between multiple URLs)
  - id: referral_with_roles_01
    subject: "Referral Request for Software Engineer Opportunities"
    body: |
      Hi {{first_name}},

      I hope you're doing well!

      I'm currently looking for full-time Software Engineer opportunities and came across {% if job_urls_list|length > 1 %}Software Engineer roles at {{company}} that closely match my background and interests{% elif job_title %}the {{job_title}} role at {{company}} that closely matches my background and interests{% else %}Software Engineer roles at {{company}} that closely match my background and interests{% endif %}.

      I'm currently working as an Applied AI Engineer Intern at DevRev, where I've been building AI-powered workflows, backend integrations, automation systems, and scalable full-stack applications. I've attached my resume for your reference.

      If you think my profile is a good fit, I'd be really grateful if you could refer me for {% if job_urls_list|length > 1 %}either of these roles{% else %}this role{% endif %}. I truly appreciate your time and support.
      {% if job_urls_list %}
      Role Links:
      {% for url in job_urls_list %}
      * {{ url }}
      {% endfor %}
      {% endif %}
      Thank you, and I look forward to hearing from you.

      {{signature}}
