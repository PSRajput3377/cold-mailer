category: job_opening_inquiry
label: "Job Opening Inquiry"
templates:
  - id: job_opening_inquiry_01
    subject: "Open SWE roles at {{company}}?"
    body: |
      {{greeting}}

      I came across {{company}} and wanted to ask directly: are you hiring Software Engineers right now?{% if skills %} I've spent the last while working with {{skills}}.{% endif %}{% if top_highlight %} {{top_highlight}} is the kind of work I'd love to keep building on.{% endif %}

      {% if job_title %}If the {{job_title}} role {% if job_id %}(Job ID {{job_id}}) {% endif %}is still open, I'd be glad to share more.{% else %}If there's a fit, I'd be happy to send over my background.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_02
    subject: "Quick question about engineering openings"
    body: |
      {{greeting}}

      Are there any open SWE positions on your team at the moment?{% if skills %} My recent work centers on {{skills}}.{% endif %}{% if recent_internship %} I most recently {{recent_internship}}.{% endif %}

      {% if job_url %}I saw a posting here: {{job_url}}{% if job_id %} (Job ID {{job_id}}){% endif %}, and it looks like a strong match.{% else %}Even if nothing's posted publicly, I'd appreciate knowing if you expect to hire soon.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_03
    subject: "Software Engineer interested in {{company}}"
    body: |
      {{greeting}}

      Reaching out because {{company}}'s work caught my attention and I'd like to know whether you have engineering roles open.{% if top_highlight %} The thing I'm proudest of recently: {{top_highlight}}.{% endif %}

      {% if github %}You can see more at {{github}}.{% endif %}{% if portfolio %} You can also view my portfolio at {{portfolio}}.{% endif %} {% if job_title %}I'm especially curious about the {{job_title}} opening {% if job_id %}(Job ID {{job_id}}) {% endif %}if it's still active.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_04
    subject: "Are you hiring engineers?"
    body: |
      {{greeting}}

      Short and direct: is {{company}} hiring Software Engineers?{% if skills %} I work mostly with {{skills}}.{% endif %}{% if recent_internship %} Recently I {{recent_internship}}.{% endif %}

      {% if job_id %}If the role with Job ID {{job_id}} is open, I'd love to be considered.{% else %}Happy to share my resume if there's anything to apply for.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_05
    subject: "Engineering opportunities at {{company}}"
    body: |
      {{greeting}}

      I've been following what {{company}} is building and wanted to check whether your engineering team is growing.{% if skills %} My strongest area is {{skills}}.{% endif %}{% if top_highlight %} {{top_highlight}} sums up the kind of problems I enjoy solving.{% endif %}

      {% if linkedin %}You can find me on LinkedIn at {{linkedin}}.{% endif %}{% if github %} My code lives at {{github}}.{% endif %} {% if job_title %}If the {{job_title}} position {% if job_url %}({{job_url}}) {% endif %}is open, I'd welcome a conversation.{% endif %}

      {{signature}}
  - id: job_opening_inquiry_06
    subject: "Following up on SWE roles"
    body: |
      {{greeting}}

      Would you have any Software Engineer openings on the horizon?{% if skills %} I bring experience in {{skills}}.{% endif %}{% if top_highlight %} One highlight from my work: {{top_highlight}}.{% endif %}

      {% if job_title %}I noticed the {{job_title}} role {% if job_id %}(Job ID {{job_id}}) {% endif %}and it lines up well with what I do.{% else %}Even a pointer to the right person to talk to would help.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_07
    subject: "Hoping to join the {{company}} engineering team"
    body: |
      {{greeting}}

      {{company}} keeps coming up in conversations about teams doing interesting engineering work, so I wanted to ask whether you're hiring.{% if recent_internship %} I recently {{recent_internship}}.{% endif %}{% if skills %} I work day to day with {{skills}}.{% endif %}

      {% if job_url %}This posting looked relevant: {{job_url}}.{% else %}If you're open to it, I'd be glad to send my resume.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_08
    subject: "Curious about open developer roles"
    body: |
      {{greeting}}

      Quick note to ask if there are developer positions open at {{company}}.{% if skills %} My background is in {{skills}}.{% endif %}{% if top_highlight %} The project I'm most proud of is {{top_highlight}}.{% endif %}

      {% if job_title %}If the {{job_title}} role {% if job_id %}(Job ID {{job_id}}) {% endif %}is still being filled, I'd appreciate the chance to apply.{% endif %}{% if portfolio %} Portfolio: {{portfolio}}.{% endif %}

      {{signature}}
  - id: job_opening_inquiry_09
    subject: "SWE looking to contribute at {{company}}"
    body: |
      {{greeting}}

      I'd like to know whether {{company}} has Software Engineer roles open.{% if skills %} To give you a sense of fit: I focus on {{skills}}.{% endif %}{% if recent_internship %} I {{recent_internship}}.{% endif %}

      {% if job_id %}If anything's open under Job ID {{job_id}}, count me interested.{% else %}If roles aren't posted yet, I'm happy to stay in touch.{% endif %} {{cta}}

      {{signature}}
