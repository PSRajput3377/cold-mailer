      {{greeting}}

      I've been following what {{company}} is building and wanted to check whether your engineering team is growing. My strongest area is {{skills}}, and {{top_highlight}} sums up the kind of problems I enjoy solving.

      My profiles: {{linkedin}} and {{github}}. {% if job_title %}If the {{job_title}} position {% if job_url %}({{job_url}}) {% endif %}is open, I'd welcome a conversation.{% endif %}

      {{signature}}
