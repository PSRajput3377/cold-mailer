category: job_opening_inquiry
label: "Job Opening Inquiry"
templates:
  - id: job_opening_inquiry_01
    subject: "Open SWE roles at {{company}}?"
    body: |
      {{greeting}}

      I came across {{company}} and wanted to ask directly: are you hiring Software Engineers right now? I've spent the last while working with {{skills}}, and {{top_highlight}} is the kind of work I'd love to keep building on.

      {% if job_title %}If the {{job_title}} role {% if job_id %}(Job ID {{job_id}}) {% endif %}is still open, I'd be glad to share more.{% else %}If there's a fit, I'd be happy to send over my background.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_02
    subject: "Quick question about engineering openings"
    body: |
      {{greeting}}

      Are there any open SWE positions on your team at the moment? My recent work centers on {{skills}}, and I most recently {{recent_internship}}.

      {% if job_url %}I saw a posting here: {{job_url}}{% if job_id %} (Job ID {{job_id}}){% endif %}, and it looks like a strong match.{% else %}Even if nothing's posted publicly, I'd appreciate knowing if you expect to hire soon.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_03
    subject: "Software Engineer interested in {{company}}"
    body: |
      {{greeting}}

      Reaching out because {{company}}'s work caught my attention and I'd like to know whether you have engineering roles open. The thing I'm proudest of recently: {{top_highlight}}.

      You can see more at {{github}} or {{portfolio}}. {% if job_title %}I'm especially curious about the {{job_title}} opening {% if job_id %}(Job ID {{job_id}}) {% endif %}if it's still active.{% endif %} {{cta}}

      {{signature}}
  - id: job_opening_inquiry_04
    subject: "Are you hiring engineers?"
    body: |
      {{greeting}}

      Short and direct: is {{company}} hiring Software Engineers? I work mostly with {{skills}} and recently {{recent_internship}}.

      {% if job_id %}If the role with Job ID {{job_id}} is open, I'd love to be considered.{% else %}Happy to share my resume if there's anything to apply for.{% endif %} {{cta}}

      {{signature}}
