category: followup_after_recruiter
label: "Following up after recruiter connection"
templates:
  - id: followup_after_recruiter_01
    subject: "Great connecting earlier"
    body: |
      {{greeting}}

      It was great connecting with you about the {{role}} role at {{company}}. After our conversation, I'm even more excited about the opportunity.

      My background in {{skills}} lines up well with what you described, and {{top_highlight}} is something I'd love to bring to the team.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_02
    subject: "Following up on our chat"
    body: |
      {{greeting}}

      Thanks again for taking the time to speak with me about {{job_title}} at {{company}}. I've been thinking about what we discussed and wanted to stay in touch.

      Given my experience with {{skills}}, I think I could add real value here. {{top_highlight}} in particular felt relevant to the work you outlined.
      {% if job_id %}For reference, the role we discussed was {{job_id}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_03
    subject: "Picking up where we left off"
    body: |
      {{greeting}}

      Following up after our call about the {{role}} opening. I appreciated you walking me through the team and what success looks like there.

      A quick reminder of where I fit: {{top_highlight}}, plus solid hands-on work in {{skills}}.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_04
    subject: "Still very interested in {{company}}"
    body: |
      {{greeting}}

      Good speaking with you the other day about {{job_title}}. I wanted to confirm that I'm genuinely interested and ready to move forward whenever the timing works.

      My strengths in {{skills}} map closely to the role, and {{top_highlight}} is the kind of result I'd aim to repeat at {{company}}.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_05
    subject: "Quick follow-up from our LinkedIn chat"
    body: |
      {{greeting}}

      Thanks for connecting on LinkedIn and for the helpful context on the {{role}} position at {{company}}.

      Since we spoke, I pulled together a couple of examples of my work with {{skills}}. {{top_highlight}} stands out as a good match for what you're looking for.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_06
    subject: "Following up from the event"
    body: |
      {{greeting}}

      Really enjoyed our conversation at the event. The {{role}} opportunity at {{company}} stuck with me, so I wanted to follow up properly.

      Short version of my fit: {{top_highlight}}, backed by strong experience in {{skills}}.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_07
    subject: "Reconnecting about the {{role}} role"
    body: |
      {{greeting}}

      Circling back after our chat about {{job_title}}. I know things get busy, so just a quick note to keep the conversation going.

      I'm confident my work in {{skills}} fits the role well, and {{top_highlight}} speaks to the impact I could have at {{company}}.
      {% if job_url %}Here's the posting we referenced: {{job_url}}{% endif %}

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_08
    subject: "Thinking more about our conversation"
    body: |
      {{greeting}}

      I've kept thinking about our discussion on the {{role}} opening at {{company}}, and it's exactly the kind of work I'm looking to do next.

      My background in {{skills}} is a close fit, and {{top_highlight}} is a concrete example of what I'd bring.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_09
    subject: "Next steps on {{job_title}}?"
    body: |
      {{greeting}}

      Thanks again for the call about {{job_title}} at {{company}}. I wanted to check in on next steps and let you know I'm keen to keep things moving.

      To recap my fit: deep experience in {{skills}} and {{top_highlight}} as a recent highlight.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_10
    subject: "Appreciated the conversation"
    body: |
      {{greeting}}

      I appreciated you sharing more about the {{role}} role and the team at {{company}} when we spoke. It confirmed this is something I'd be excited to pursue.

      My skill set in {{skills}} aligns well, and {{top_highlight}} is the sort of contribution I'd hope to make.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_11
    subject: "Following up as promised"
    body: |
      {{greeting}}

      As promised, following up after our chat about {{job_title}}. Thanks for the time and the helpful insight into what the team needs.

      I'll keep it brief: {{top_highlight}}, and a strong foundation in {{skills}} that fits the role at {{company}}.
      {% if job_id %}The req we discussed was {{job_id}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_12
    subject: "Still excited about the {{role}} opportunity"
    body: |
      {{greeting}}

      A quick follow-up to our conversation about the {{role}} position. The more I learn about {{company}}, the more excited I am about the fit.

      My experience with {{skills}} maps directly to the work, and {{top_highlight}} shows the kind of results I can deliver.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_13
    subject: "Good to connect last week"
    body: |
      {{greeting}}

      Great to connect last week about {{job_title}} at {{company}}. I wanted to follow up while it's fresh and reaffirm my interest.

      In short: {{top_highlight}}, plus a track record in {{skills}} that fits the role well.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_14
    subject: "Keeping the conversation going"
    body: |
      {{greeting}}

      Following up on our talk about the {{role}} opening. I enjoyed hearing how the team works and where they're headed.

      For a quick refresher, my strengths in {{skills}} and {{top_highlight}} are what I'd bring to {{company}}.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_15
    subject: "Touching base on {{job_title}}"
    body: |
      {{greeting}}

      Touching base after we spoke about {{job_title}}. No rush on your end, I just wanted to stay connected and keep the door open.

      My work in {{skills}} fits closely with the role, and {{top_highlight}} is a recent example I'm proud of.
      {% if job_url %}The role link, for convenience: {{job_url}}{% endif %}

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_16
    subject: "A quick note after our call"
    body: |
      {{greeting}}

      Quick note to say thanks for the call about the {{role}} role at {{company}}. It gave me a much clearer picture, and I'm all in.

      Where I fit: {{top_highlight}}, with strong hands-on experience in {{skills}}.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_17
    subject: "Following up with a few details"
    body: |
      {{greeting}}

      After our conversation about {{job_title}}, I wanted to follow up with a bit more on why I think it's a strong match.

      My experience centers on {{skills}}, and {{top_highlight}} reflects the kind of impact I'd aim for at {{company}}.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_18
    subject: "Reaffirming my interest"
    body: |
      {{greeting}}

      Following up to reaffirm my interest in the {{role}} role at {{company}} after our chat. It's exactly the direction I want my next move to take.

      A quick reminder of my fit: {{top_highlight}} and solid depth in {{skills}}.

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_19
    subject: "Hope we can keep things moving"
    body: |
      {{greeting}}

      Thanks again for connecting about {{job_title}}. I'd love to keep things moving and am happy to share anything that would help on your side.

      My background in {{skills}} fits the role well, and {{top_highlight}} is one example of what I can contribute at {{company}}.
      {% if job_id %}Referencing req {{job_id}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: followup_after_recruiter_20
    subject: "Checking in on the {{role}} role"
    body: |
      {{greeting}}

      Just checking in after our conversation about the {{role}} position at {{company}}. I remain very interested and wanted to keep the line open.

      To recap: {{top_highlight}}, supported by strong experience in {{skills}}.

      {{cta}}

      {{signature}}
