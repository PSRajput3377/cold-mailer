category: applied_requesting_referral
label: "Applied already and requesting referral"
templates:
  - id: applied_requesting_referral_01
    subject: "Applied to {{job_title}} — quick referral ask"
    body: |
      {{greeting}}

      I recently applied to the {{job_title}} role {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}} and wanted to reach out directly.{% if skills %} With my background in {{skills}}, I think I'd be a strong fit, and a referral from you would mean a lot in getting my application a closer look.{% else %} A referral from you would mean a lot in getting my application a closer look.{% endif %}

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_02
    subject: "Would you put in a word? {{job_title}} application"
    body: |
      {{greeting}}

      Just submitted my application for {{job_title}} {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}}.{% if top_highlight %} {{top_highlight}} is the kind of work I'd love to bring to the team.{% endif %} If you're comfortable, a quick referral would help my resume rise above the pile.

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_03
    subject: "Following up on my {{company}} application"
    body: |
      {{greeting}}

      I applied for the {{job_title}} position {% if job_id %}(Job ID {{job_id}}){% endif %} a few days ago and figured I'd be honest about why I'm messaging: a referral from someone on the inside goes a long way.{% if skills %} My strengths in {{skills}} line up closely with what the role needs.{% endif %}

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_04
    subject: "Quick ask re: {{job_title}} at {{company}}"
    body: |
      {{greeting}}

      Short version: I've already applied to {{job_title}} {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}}, and I'd be grateful if you could flag my application internally.{% if top_highlight %} {{top_highlight}}, which I think speaks to the role.{% endif %}

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_05
    subject: "Hoping for a referral — {{job_title}}"
    body: |
      {{greeting}}

      I put in an application for the {{job_title}} role {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}} this week. I know how much weight an internal referral carries, so I wanted to ask directly.{% if skills %} My experience with {{skills}} maps well to what you're hiring for.{% endif %}

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_06
    subject: "My application is in — any chance you'd refer me?"
    body: |
      {{greeting}}

      My application for {{job_title}} {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}} is officially submitted. If it's not too much to ask, a referral from you could really help it stand out.{% if top_highlight %} Quick on my fit: {{top_highlight}}.{% endif %}

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_07
    subject: "Referral request for {{job_title}}"
    body: |
      {{greeting}}

      I recently applied to {{job_title}} {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}} and was hoping you might be able to refer me or put in a good word.{% if skills %} I bring solid experience in {{skills}}, and I'd be happy to share more if it's useful.{% else %} I'd be happy to share more if it's useful.{% endif %}

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_08
    subject: "Small favor — {{company}} application"
    body: |
      {{greeting}}

      I'll keep this brief: I've applied for the {{job_title}} opening {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}} and would really appreciate a referral if you're willing.{% if top_highlight %} {{top_highlight}}, so I'm confident I could contribute quickly.{% endif %}

      {{cta}}

      {{signature}}

  - id: applied_requesting_referral_09
