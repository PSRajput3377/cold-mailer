      Application is in for {{job_title}} {% if job_id %}(Job ID {{job_id}}){% endif %} at {{company}}. Applications can disappear into the void, so I'm reaching out to ask if you'd refer me internally.{% if skills %} My work in {{skills}} is right in line with the role.{% endif %}

